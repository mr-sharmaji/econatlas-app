name: econatlas_app
description: EconAtlas - Personal Economic Intelligence Dashboard
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  go_router: ^14.2.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  package_info_plus: ^8.0.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.6
  timeago: ^3.6.1
  connectivity_plus: ^6.0.3
  timezone: ^0.10.1
  dropdown_search: ^6.0.2
  font_awesome_flutter: ^10.7.0
  flutter_svg: ^2.0.9
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^19.0.0
  sqflite: ^2.3.3+2
  path: ^1.9.0
  speech_to_text: ^7.0.0
  share_plus: ^10.1.4
  flutter_markdown: ^0.7.6
  markdown: ^7.3.0
  home_widget: ^0.9.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/asset_logos/
    - assets/badge_svgs/
    - assets/badge_svgs/flags/
    - assets/badge_svgs/categories/
